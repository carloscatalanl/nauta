<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" href="assets/favicon.svg" type="image/svg" />
    <title>Nauta Dev</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <link rel="stylesheet" href="assets/css/main.css" />
    <noscript
      ><link rel="stylesheet" href="assets/css/noscript.css"
    /></noscript>
  </head>
  <body class="is-preload">
    <!-- Wrapper -->
    <div id="wrapper">
      <!-- Main -->
      <section id="main">
        <header>
          <span class="icon solid major fa-user-astronaut mr-2"></span>
          <span class="icon solid major fa-laptop-code"></span>

          <h1><strong class="nasa-font">NAUTA</strong> DEV</h1>
          <h3>Carlos Catalán</h3>
          <h3>Platform | CLoud Engineer</h3>
          <br>
        </header>
        <footer>
          <ul class="icons">
            <li>
              <a href="#" 
                id="copyEmail" 
                data-email="carlosacatalanlz@gmail.com" 
                class="icon solid fa-envelope">
                <span id="copyFeedback" style="display:none; position:absolute; top:0px; left:0%; transform:translateX(-50%); font-size: 8px; color: #fff; background: #333; padding: 2px 5px; border-radius: 3px;">Copied!</span>
                Mail
              </a>
            </li>
            <li><a href="https://www.linkedin.com/in/carloscatalanl/" target="_blank" class="icon brands fa-linkedin">Linkedin</a></li>
            <li><a href="doc/cv.pdf" target="_blank" class="icon solid fa-address-card">CV</a></li>
          </ul>
        </footer>
      </section>

      <!-- Footer -->
      <footer id="footer">
        <ul class="copyright">
          <li><a href="https://www.github.com/carloscatalanl/" target="_blank" class="icon brands fa-github">GitHub</a></li>
          <li><a href="https://www.linkedin.com/in/carloscatalanl/" target="_blank" class="icon brands fa-github">Linkedin</a></li>
        </ul>
      </footer>
    </div>

    <!-- Scripts -->
    <script>
      if ("addEventListener" in window) {
        window.addEventListener("load", function () {
          document.body.className = document.body.className.replace(
            /\bis-preload\b/,
            ""
          );
        });
        document.body.className += navigator.userAgent.match(/(MSIE|rv:11\.0)/)
          ? " is-ie"
          : "";
      } 
      // Email Copy Logic
      const emailLink = document.getElementById('copyEmail');
      const feedback = document.getElementById('copyFeedback');

      emailLink.addEventListener('click', function(e) {
        e.preventDefault(); // Prevents the page from jumping to the top
        const email = this.getAttribute('data-email');

        navigator.clipboard.writeText(email).then(() => {
          // Show "Copied!" feedback
          feedback.style.display = 'block';
          
          // Hide feedback
          setTimeout(() => {
            feedback.style.display = 'none';
          }, 500);
        }).catch(err => {
          console.error('Copy failed', err);
        });
      });
    </script>
  </body>
</html>
